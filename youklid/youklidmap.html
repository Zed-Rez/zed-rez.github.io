<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
<title>Youklid · Dependency Map</title>
<meta name="description" content="Interactive dependency map for Euclid's Elements Book I — browse how every proposition, postulate, definition, and common notion connects.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Gentium+Plus:ital,wght@0,400;0,700;1,400&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./styles.css">
</head>
<body data-view="map" data-lang="en" data-theme="parchment" data-init-map="true">

<header id="top-bar">
  <div class="brand">
    <a href="./index.html" id="home-link" aria-label="Youklid home">
      <span class="brand-mark">Υ</span><span class="brand-name">ouklid</span>
    </a>
    <span class="brand-sub">Elements · Book I</span>
  </div>

  <a href="./index.html" class="map-back-link" aria-label="Return to text view">← Text</a>

  <nav class="lang-toggle" aria-label="Language">
    <button class="lang" data-lang="en" aria-pressed="true">English</button>
    <button class="lang" data-lang="gr" aria-pressed="false">Ἑλληνικά</button>
  </nav>

  <div class="theme-toggle">
    <button id="theme-btn" aria-label="Toggle theme">◐</button>
  </div>
</header>

<!-- Stub text-view so shared app.js finds its elements -->
<div id="text-view" class="view" hidden></div>

<!-- =========================== MAP VIEW =========================== -->
<div id="map-view" class="view active">
  <section id="map-canvas-wrap">
    <div id="map-info-strip">
      <div class="map-kind" id="map-selected-kind"></div>
      <h1 id="map-selected-title">Dependency Map</h1>
      <p id="map-selected-text" class="map-selected-text"></p>
      <div id="map-fitz-note" class="prop-enunciation-note" hidden>
        <span class="fitz-pop-sym">†</span>
        <span class="fitz-note-text"></span>
      </div>
      <a id="map-goto-text" href="./index.html" hidden>→ View proof</a>
    </div>
    <svg id="map-svg" aria-label="Dependency map" preserveAspectRatio="xMidYMid meet"></svg>
  </section>
</div>

<footer id="site-footer">
  <span>Text: Heiberg (1883–85) Greek &amp; Fitzpatrick English &mdash; public domain.</span>
  <span>Citations by Fitzpatrick; additional links inferred with Claude Haiku 4.5.</span>
  <span class="kbd-hint"><kbd>L</kbd> lang · <kbd>M</kbd> text view · click any node to explore</span>
</footer>

<script src="./figure.js"></script>
<script src="./app.js"></script>
</body>
</html>
